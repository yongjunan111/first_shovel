name: earth_canvas
description: Draw your ride on Earth's canvas — Seoul edition.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Map
  flutter_map: ^6.1.0          # Leaflet-style OSM map for Flutter
  latlong2: ^0.9.0             # LatLng coordinate type
  flutter_map_cancellable_tile_provider: ^2.0.0  # Better tile loading/cancellation

  # GPS
  geolocator: ^12.0.0          # Live GPS position
  permission_handler: ^11.3.0  # Runtime permissions (location)

  # HTTP / API
  dio: ^5.4.3                  # HTTP client for backend calls

  # State
  flutter_riverpod: ^2.5.1     # Lightweight state management

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
